name: Daily AI Report Update

# 設定機器人的鬧鐘
on:
  schedule:
    # 台灣時間下午 3:30 執行 (台灣是 UTC+8，所以填 07:30 UTC)，每週一到週五執行
    - cron: '30 7 * * 1-5'
  # 允許我們隨時手動點擊執行
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest # 租用一台免費的 Linux 雲端電腦

    steps:
      - name: 📥 下載最新程式碼
        uses: actions/checkout@v3

      - name: 🐍 安裝 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 安裝套件
        run: pip install yfinance pandas numpy google-generativeai

      - name: 🤖 執行 AI 造庫程式
        env:
          # 從保險箱拿出密碼給 Python 用
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_db.py

      - name: 💾 將新的資料庫存回 GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ai_database.json
          git commit -m "🤖 自動更新 AI 盤後報告" || exit 0
          git push
