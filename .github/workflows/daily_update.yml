name: Daily AI Report Update
on:
  workflow_dispatch:
  schedule:
    - cron: '30 7 * * 1-5'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -U yfinance pandas google-generativeai

      - name: Run analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_db.py

      - name: Force Push results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add ai_database.json
          git commit -m "🤖 AI 自動更新" || exit 0
          # 使用 --force 直接覆蓋，徹底解決 Rejected 與 Rebase 衝突
          git push --force origin main
