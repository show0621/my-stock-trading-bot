name: Daily AI Report Update
on:
  workflow_dispatch:
  schedule:
    - cron: '30 7 * * 1-5'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -U yfinance pandas google-generativeai

      - name: Run analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_db.py

      - name: Push results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          # 關鍵步驟：先將產出的檔案 commit，讓工作區乾淨
          git add ai_database.json
          git commit -m "🤖 AI 自動更新資料庫" || echo "No changes to commit"
          
          # 此時工作區是乾淨的，可以安全地拉取網頁端的改動並合併
          git pull origin main --rebase
          
          # 最後推送到 GitHub
          git push origin main
