name: Daily AI Report Update
on:
  workflow_dispatch:
  schedule:
    - cron: '30 7 * * 1-5'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 安裝對應套件
        run: |
          pip install yfinance pandas numpy google-generativeai

      - name: 🤖 執行分析
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_db.py

      - name: 💾 強制存檔
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git pull --rebase origin main  # 👈 解決 Rejected 的關鍵：先拉再推
          git add ai_database.json
          git commit -m "🤖 自動更新報告" || exit 0
          git push
